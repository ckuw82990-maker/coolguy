<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarTV | Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Ambience background */
        #ambience {
            position: fixed;
            inset: 0;
            background-position: center;
            background-size: cover;
            filter: blur(60px) brightness(0.2);
            z-index: -1;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
        }
        #ambience.active { opacity: 1; }

        .search-container {
            width: 100%;
            max-width: 600px;
            margin-top: 4rem;
            z-index: 10;
        }

        input[type='search'] {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 99px;
            border: 1px solid rgba(255,255,255,0.1);
            outline: none;
            background: rgba(15, 23, 42, 0.8);
            color: #eee;
            box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.4);
            transition: all 0.3s ease;
        }
        input[type='search']:focus {
            border-color: var(--accent);
            box-shadow: 0 10px 40px -10px rgba(139, 92, 246, 0.6);
            transform: scale(1.02);
        }

        #results {
            width: 100%;
            max-width: 800px;
            max-height: 400px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
            padding: 10px;
            z-index: 10;
        }
        #results.hidden { display: none; }

        .video-card {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .video-card:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateX(10px);
        }

        .video-thumb {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 16px;
        }

        .video-info { flex: 1; }
        .video-title { font-size: 0.95rem; font-weight: 600; color: #f0f0ff; line-height: 1.2; margin-bottom: 4px; }
        .video-channel { font-size: 0.8rem; color: #94a3b8; }

        #player-wrapper {
            width: 100%;
            max-width: 960px;
            margin: 2rem auto;
            aspect-ratio: 16 / 9;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #000;
            display: none;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #player-wrapper.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        iframe { width: 100%; height: 100%; border: none; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ambience"></div>

    <div class="search-container px-6">
        <div class="text-center mb-8">
            <h1 class="heading-font text-3xl font-black italic tracking-tighter">STAR<span class="text-violet-500">TV</span></h1>
            <p class="text-slate-500 text-xs uppercase tracking-[0.2em] mt-2">Nexus Multimedia Engine</p>
        </div>
        <input type="search" id="searchInput" placeholder="Search YouTube..." autocomplete="off">
    </div>

    <div id="results" class="hidden px-6"></div>

    <div id="player-wrapper">
        <div id="player"></div>
    </div>

    <script>
        // Using the API key provided in your snippet
        const apiKey = 'AIzaSyCZu34x1u7ewgeqqmxYk96O7aqMo3uojqo';

        async function searchYouTube(query) {
            try {
                const searchRes = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=10&q=${encodeURIComponent(query)}&key=${apiKey}`
                );
                const searchData = await searchRes.json();
                if (!searchData.items) return [];

                const videoIds = searchData.items.map(item => item.id.videoId).join(',');
                const videosRes = await fetch(
                    `https://www.googleapis.com/youtube/v3/videos?part=status,snippet&id=${videoIds}&key=${apiKey}`
                );
                const videosData = await videosRes.json();
                if (!videosData.items) return [];

                return videosData.items
                    .filter(v => v.status.embeddable && v.status.privacyStatus === 'public')
                    .map(v => ({
                        id: v.id,
                        title: v.snippet.title,
                        channel: v.snippet.channelTitle,
                        thumbnail: v.snippet.thumbnails.medium.url,
                        maxThumbnail: v.snippet.thumbnails.maxres?.url || v.snippet.thumbnails.high.url,
                    }));
            } catch (e) {
                console.error("Search error", e);
                return [];
            }
        }

        function showResults(videos) {
            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = '';
            if (videos.length === 0) {
                resultsEl.innerHTML = '<p class="text-center text-slate-500 py-10">No results found.</p>';
                return;
            }
            videos.forEach((video) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <img class="video-thumb" src="${video.thumbnail}" />
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-channel">${video.channel}</div>
                    </div>
                `;
                card.onclick = () => playVideo(video);
                resultsEl.appendChild(card);
            });
            resultsEl.classList.remove('hidden');
        }

        function playVideo(video) {
            const playerWrapper = document.getElementById('player-wrapper');
            const player = document.getElementById('player');
            const ambience = document.getElementById('ambience');
            const results = document.getElementById('results');

            results.classList.add('hidden');
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1&controls=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            playerWrapper.classList.add('active');

            ambience.style.backgroundImage = `url('${video.maxThumbnail}')`;
            ambience.classList.add('active');
        }

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            
            if (!query) {
                document.getElementById('results').classList.add('hidden');
                document.getElementById('player-wrapper').classList.remove('active');
                document.getElementById('ambience').classList.remove('active');
                return;
            }

            searchTimeout = setTimeout(() => {
                searchYouTube(query).then(showResults);
            }, 500);
        });
    </script>
</body>
</html>
