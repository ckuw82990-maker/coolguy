<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #8a2be2;
            --bg-dark: #050508;
            --glass: rgba(15, 15, 25, 0.7);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }
        .mono { font-family: 'Fira Code', monospace; }

        /* Animated Aura Background */
        .aura {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            transition: all 1s ease;
            filter: blur(80px);
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .sidebar-btn {
            @apply p-4 mb-2 rounded-xl transition-all duration-300 flex items-center justify-center cursor-pointer;
            color: #666;
        }

        .sidebar-btn:hover {
            background: rgba(138, 43, 226, 0.2);
            color: var(--accent);
        }

        .sidebar-btn.active {
            background: rgba(138, 43, 226, 0.3);
            color: white;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }

        .app-window {
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        .app-window.active {
            display: flex;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        textarea {
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: #d1d1d1;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #8a2be2; border-radius: 10px; }
    </style>
</head>
<body onload="init()">

    <div id="aura1" class="aura top-[-10%] left-[-10%]"></div>
    <div id="aura2" class="aura bottom-[-10%] right-[-10%]"></div>

    <div class="flex h-screen w-screen p-4 gap-4">
        
        <!-- SIDEBAR NAVIGATION -->
        <nav class="w-20 glass rounded-2xl flex flex-col items-center py-6 z-50">
            <div class="mb-8">
                <div class="w-10 h-10 bg-purple-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-500/50">
                    <span class="orbitron font-bold text-white">N</span>
                </div>
            </div>

            <div class="sidebar-btn active" onclick="switchTab('dashboard', this)" title="Dashboard">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            </div>

            <div class="sidebar-btn" onclick="switchTab('notes', this)" title="Notes">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            </div>

            <div class="sidebar-btn" onclick="switchTab('proxy', this)" title="Web Proxy">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            </div>

            <hr class="w-8 border-gray-800 my-4">

            <a href="GamingHub_All-in-One.html" class="sidebar-btn" title="Main Hub">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            </a>

            <a href="games.html" class="sidebar-btn" title="Games Library">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            </a>

            <div class="mt-auto">
                <div class="sidebar-btn text-red-500/70 hover:bg-red-500/20 hover:text-red-500" onclick="panic()" title="PANIC">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                </div>
            </div>
        </nav>

        <!-- MAIN CONTENT AREA -->
        <main class="flex-1 relative">
            
            <!-- DASHBOARD TAB -->
            <div id="dashboard" class="app-window active flex-col gap-6 h-full p-8">
                <header>
                    <h1 class="orbitron text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-purple-400">Nexus Command</h1>
                    <p class="text-gray-500 mt-2">System Status: <span class="text-green-500">OPTIMIZED</span></p>
                </header>

                <div class="grid grid-cols-3 gap-6">
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-xs text-purple-400 orbitron uppercase tracking-widest mb-2">Memory usage</p>
                        <div class="flex items-end gap-2">
                            <span class="text-3xl font-bold">3.2</span><span class="text-gray-500 pb-1">GB</span>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-xs text-purple-400 orbitron uppercase tracking-widest mb-2">Network latency</p>
                        <div class="flex items-end gap-2">
                            <span class="text-3xl font-bold">12</span><span class="text-gray-500 pb-1">ms</span>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-2xl flex flex-col justify-center">
                        <p id="clock" class="text-3xl font-bold mono tracking-tighter text-center">00:00:00</p>
                    </div>
                </div>

                <div class="flex-1 glass rounded-2xl p-8 flex items-center justify-center">
                   <div class="text-center max-w-md">
                        <div class="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                        <h2 class="text-xl font-semibold mb-2">Operational Background Mode</h2>
                        <p class="text-gray-500 text-sm">All stealth modules are active. Press <kbd class="px-2 py-1 bg-gray-800 rounded">ALT+G</kbd> to quickly cloak this tab.</p>
                   </div>
                </div>
            </div>

            <!-- NOTES TAB -->
            <div id="notes" class="app-window flex-col h-full glass rounded-2xl overflow-hidden">
                <div class="flex h-full">
                    <div class="w-64 border-r border-white/5 p-4 flex flex-col">
                        <h3 class="orbitron text-xs text-purple-400 mb-4 tracking-widest">FILES</h3>
                        <div id="noteList" class="flex-1 space-y-2 overflow-y-auto"></div>
                        <button onclick="createNewNote()" class="mt-4 w-full py-2 bg-purple-600/20 border border-purple-500/30 rounded-lg text-xs hover:bg-purple-600/40 transition">NEW DOCUMENT</button>
                    </div>
                    <div class="flex-1 flex flex-col p-8">
                        <input id="noteTitle" type="text" class="bg-transparent text-2xl font-bold mb-4 outline-none w-full" placeholder="Untitled Document">
                        <textarea id="noteContent" class="flex-1 w-full text-lg leading-relaxed" placeholder="Start typing..."></textarea>
                    </div>
                </div>
            </div>

            <!-- PROXY TAB -->
            <div id="proxy" class="app-window flex-col h-full glass rounded-2xl overflow-hidden">
                <div class="p-3 bg-white/5 flex items-center gap-4">
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                    </div>
                    <input id="proxyUrl" type="text" class="flex-1 bg-black/40 border border-white/10 px-4 py-1 rounded-full text-sm outline-none focus:border-purple-500" placeholder="Enter URL or search..." onkeydown="if(event.key==='Enter') loadProxy()">
                    <button onclick="loadProxy()" class="text-purple-400 hover:text-white transition">GO</button>
                </div>
                <div class="flex-1 bg-white">
                    <iframe id="proxyFrame" class="w-full h-full border-none" src="about:blank"></iframe>
                </div>
            </div>

        </main>

        <!-- STEALTH CONTROL BAR -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 px-6 py-3 glass rounded-full z-[100]">
            <button onclick="cloak()" class="text-xs orbitron hover:text-purple-400 transition">CLOAK TAB</button>
            <div class="w-[1px] h-4 bg-white/10"></div>
            <button onclick="panic()" class="text-xs orbitron text-red-400 hover:text-red-300 transition">FORCE PANIC</button>
        </div>

    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('nexus_notes')) || [{id: 1, title: 'Welcome', content: 'This is your secure workspace.'}];
        let activeNoteId = 1;

        function init() {
            renderNoteList();
            loadNote(1);
            setInterval(updateClock, 1000);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('active'));
            document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');

            // Change Aura color
            if(tabId === 'proxy') {
                document.getElementById('aura1').style.background = 'radial-gradient(circle, rgba(66, 135, 245, 0.15) 0%, rgba(0,0,0,0) 70%)';
            } else if(tabId === 'notes') {
                document.getElementById('aura1').style.background = 'radial-gradient(circle, rgba(138, 43, 226, 0.15) 0%, rgba(0,0,0,0) 70%)';
            } else {
                document.getElementById('aura1').style.background = 'radial-gradient(circle, rgba(138, 43, 226, 0.1) 0%, rgba(0,0,0,0) 70%)';
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false });
        }

        // --- NOTES LOGIC ---
        function renderNoteList() {
            const list = document.getElementById('noteList');
            list.innerHTML = notes.map(note => `
                <div onclick="loadNote(${note.id})" class="p-3 rounded-lg cursor-pointer text-sm ${activeNoteId === note.id ? 'bg-purple-600/20 border border-purple-500/30' : 'hover:bg-white/5'}">
                    <p class="truncate font-semibold">${note.title || 'Untitled'}</p>
                    <p class="truncate text-[10px] text-gray-500">${note.content.substring(0, 20)}...</p>
                </div>
            `).join('');
        }

        function loadNote(id) {
            activeNoteId = id;
            const note = notes.find(n => n.id === id);
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content;
            renderNoteList();
        }

        document.getElementById('noteContent').addEventListener('input', saveNote);
        document.getElementById('noteTitle').addEventListener('input', saveNote);

        function saveNote() {
            const note = notes.find(n => n.id === activeNoteId);
            note.title = document.getElementById('noteTitle').value;
            note.content = document.getElementById('noteContent').value;
            localStorage.setItem('nexus_notes', JSON.stringify(notes));
            renderNoteList();
        }

        function createNewNote() {
            const newId = Date.now();
            notes.push({id: newId, title: 'New Note', content: ''});
            loadNote(newId);
        }

        // --- PROXY LOGIC ---
        function loadProxy() {
            let url = document.getElementById('proxyUrl').value;
            if (!url.startsWith('http')) url = 'https://www.google.com/search?q=' + url;
            // Using a simple workaround for framing. For true proxying, we'd use your specific backend.
            document.getElementById('proxyFrame').src = url;
        }

        // --- STEALTH LOGIC ---
        function panic() {
            window.location.href = "https://www.google.com";
        }

        function cloak() {
            document.title = "Class Notes - World History";
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico';
            document.getElementsByTagName('head')[0].appendChild(link);
            alert("Tab Cloaked. Title: Class Notes");
        }
    </script>
</body>
</html>
