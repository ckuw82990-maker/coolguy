<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarTV | Nexus Stealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
        }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Sidebar Navigation */
        .sidebar {
            width: 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            border-right: 1px solid rgba(255,255,255,0.05);
            background: rgba(2, 6, 23, 0.8);
            z-index: 50;
        }
        .nav-item {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #64748b;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }

        /* Ambience background */
        #ambience {
            position: fixed;
            inset: 0;
            background-position: center;
            background-size: cover;
            filter: blur(80px) brightness(0.25);
            z-index: -1;
            opacity: 0;
            transition: opacity 2s ease;
            pointer-events: none;
        }
        #ambience.active { opacity: 1; }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            max-width: 650px;
            margin-top: 2rem;
            z-index: 10;
        }

        input[type='search'] {
            width: 100%;
            padding: 1.2rem 1.8rem;
            font-size: 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            outline: none;
            background: rgba(15, 23, 42, 0.6);
            color: #eee;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        input[type='search']:focus {
            border-color: var(--accent);
            background: rgba(15, 23, 42, 0.9);
            transform: translateY(-2px);
        }

        #results {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 20px;
            z-index: 10;
        }
        #results.hidden { display: none; }

        .video-card {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .video-card:hover {
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--accent);
            transform: scale(1.01) translateX(5px);
        }

        .video-thumb {
            width: 130px;
            height: 73px;
            object-fit: cover;
            border-radius: 10px;
            margin-right: 18px;
        }

        #player-wrapper {
            width: 100%;
            max-width: 1000px;
            margin: 2rem auto;
            aspect-ratio: 16 / 9;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            background: #000;
            display: none;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #player-wrapper.active { display: block; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        iframe { width: 100%; height: 100%; border: none; }

        /* Stealth Controls Overlay */
        .stealth-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            z-index: 100;
        }
        .stealth-btn {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 0.6rem 1.2rem;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .stealth-btn:hover { border-color: var(--accent); color: var(--accent); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.2); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ambience"></div>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="nav-item active" title="StarTV Engine">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></svg>
        </div>
        <div class="nav-item" title="Game Library" onclick="window.location.href='index.html'">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4m-2-2v4m7-1h.01m2.99-2h.01"/></svg>
        </div>
        <div class="nav-item" title="Cloud Sync">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="mt-auto nav-item" onclick="launchPanic()">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
    </aside>

    <main class="main-content">
        <div class="search-container">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="heading-font text-2xl font-black italic">STAR<span class="text-violet-500">TV</span></h1>
                    <p id="status-text" class="text-[10px] text-slate-500 uppercase tracking-widest">Multimedia Link Established</p>
                </div>
                <div class="flex gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]"></span>
                    <span class="w-2 h-2 rounded-full bg-slate-800"></span>
                </div>
            </div>
            <input type="search" id="searchInput" placeholder="Search decrypted streams..." autocomplete="off">
        </div>

        <div id="results" class="hidden"></div>

        <div id="player-wrapper">
            <div id="player"></div>
        </div>
    </main>

    <!-- Stealth Controls -->
    <div class="stealth-bar">
        <button onclick="launchPanic()" class="stealth-btn text-red-500">Panic Close</button>
        <button onclick="cloakTab()" class="stealth-btn">Cloak Tab</button>
        <button onclick="window.location.reload()" class="stealth-btn">Reset</button>
    </div>

    <script>
        const apiKey = 'AIzaSyCZu34x1u7ewgeqqmxYk96O7aqMo3uojqo';

        // Panic function: redirect to Google
        function launchPanic() { window.location.href = 'https://www.google.com'; }

        // Cloak function: change tab title/icon
        function cloakTab() {
            document.title = "Google Docs";
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon';
            link.rel = 'shortcut icon';
            link.href = 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico';
            document.getElementsByTagName('head')[0].appendChild(link);
        }

        async function searchYouTube(query) {
            try {
                const searchRes = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=12&q=${encodeURIComponent(query)}&key=${apiKey}`
                );
                const searchData = await searchRes.json();
                if (!searchData.items) return [];

                const videoIds = searchData.items.map(item => item.id.videoId).join(',');
                const videosRes = await fetch(
                    `https://www.googleapis.com/youtube/v3/videos?part=status,snippet&id=${videoIds}&key=${apiKey}`
                );
                const videosData = await videosRes.json();
                if (!videosData.items) return [];

                return videosData.items
                    .filter(v => v.status.embeddable && v.status.privacyStatus === 'public')
                    .map(v => ({
                        id: v.id,
                        title: v.snippet.title,
                        channel: v.snippet.channelTitle,
                        thumbnail: v.snippet.thumbnails.medium.url,
                        maxThumbnail: v.snippet.thumbnails.maxres?.url || v.snippet.thumbnails.high.url,
                    }));
            } catch (e) { return []; }
        }

        function showResults(videos) {
            const resultsEl = document.getElementById('results');
            resultsEl.innerHTML = '';
            if (videos.length === 0) {
                resultsEl.innerHTML = '<p class="text-center text-slate-500 py-10">No signals found.</p>';
                return;
            }
            videos.forEach((video) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <img class="video-thumb" src="${video.thumbnail}" />
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-channel text-violet-400 font-bold">${video.channel}</div>
                    </div>
                `;
                card.onclick = () => playVideo(video);
                resultsEl.appendChild(card);
            });
            resultsEl.classList.remove('hidden');
            document.getElementById('player-wrapper').classList.remove('active');
        }

        function playVideo(video) {
            const playerWrapper = document.getElementById('player-wrapper');
            const player = document.getElementById('player');
            const ambience = document.getElementById('ambience');
            const results = document.getElementById('results');

            results.classList.add('hidden');
            player.innerHTML = `<iframe src="https://www.youtube.com/embed/${video.id}?autoplay=1&controls=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            playerWrapper.classList.add('active');

            ambience.style.backgroundImage = `url('${video.maxThumbnail}')`;
            ambience.classList.add('active');
            
            document.getElementById('status-text').innerText = `NOW STREAMING: ${video.id}`;
        }

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            
            if (!query) {
                document.getElementById('results').classList.add('hidden');
                document.getElementById('player-wrapper').classList.remove('active');
                document.getElementById('ambience').classList.remove('active');
                document.getElementById('status-text').innerText = "Multimedia Link Established";
                return;
            }

            searchTimeout = setTimeout(() => {
                searchYouTube(query).then(showResults);
            }, 600);
        });
    </script>
</body>
</html>
