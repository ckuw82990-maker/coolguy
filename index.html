<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #3b82f6; }
        body { margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Desktop Wallpaper */
        #wallpaper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?q=80&w=2070&auto=format&fit=crop') no-repeat center center;
            background-size: cover; z-index: -1;
        }

        /* App Windows */
        .window {
            position: absolute; top: 100px; left: 150px; width: 700px; height: 450px;
            background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); display: none; flex-direction: column; z-index: 10;
        }
        .win-header { padding: 12px; background: rgba(255,255,255,0.03); display: flex; align-items: center; cursor: move; border-radius: 12px 12px 0 0; }
        
        /* The Proxy UI */
        .proxy-container {
            padding: 40px; text-align: center; color: white;
        }
        .proxy-input {
            width: 100%; max-width: 500px; background: #1a1a24; border: 1px solid #333;
            padding: 12px 20px; border-radius: 30px; color: white; outline: none; transition: 0.3s;
        }
        .proxy-input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        /* Dock */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 15px; align-items: center;
        }
        .dock-app { width: 50px; height: 50px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .dock-app:hover { transform: scale(1.2) translateY(-10px); }

        .btn-glow {
            background: var(--accent); color: white; padding: 10px 25px; border-radius: 20px;
            font-weight: bold; font-size: 14px; transition: 0.3s; margin-top: 20px;
        }
        .btn-glow:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="wallpaper"></div>

    <!-- WINDOW: WEB PROXY -->
    <div id="win-proxy" class="window">
        <div class="win-header" onmousedown="dragWin(this.parentElement)">
            <div class="flex gap-2">
                <div class="w-3 h-3 bg-red-500 rounded-full cursor-pointer" onclick="closeWin('win-proxy')"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            </div>
            <span class="ml-4 text-[10px] text-gray-400 uppercase tracking-tighter">Nexus Secure Bypass v4.0</span>
        </div>
        
        <div class="proxy-container">
            <div class="mb-6">
                <h1 class="text-2xl font-bold mb-2">Web Engine</h1>
                <p class="text-gray-500 text-xs">Routing via high-speed stealth nodes. Bypasses GoGuardian, Securly, and Fortinet.</p>
            </div>

            <input id="target-url" type="text" placeholder="Enter URL or Search Query..." class="proxy-input mb-4">
            
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="launch('uv')" class="btn-glow">Ultraviolet Node</button>
                <button onclick="launch('rh')" class="btn-glow bg-purple-600">Rammerhead Node</button>
            </div>

            <div class="mt-8 grid grid-cols-4 gap-4">
                <div class="p-3 bg-white/5 rounded-lg cursor-pointer hover:bg-white/10" onclick="quickLaunch('https://www.google.com')">
                    <span class="block text-sm">Google</span>
                </div>
                <div class="p-3 bg-white/5 rounded-lg cursor-pointer hover:bg-white/10" onclick="quickLaunch('https://www.youtube.com')">
                    <span class="block text-sm">YouTube</span>
                </div>
                <div class="p-3 bg-white/5 rounded-lg cursor-pointer hover:bg-white/10" onclick="quickLaunch('https://www.discord.com')">
                    <span class="block text-sm">Discord</span>
                </div>
                <div class="p-3 bg-white/5 rounded-lg cursor-pointer hover:bg-white/10" onclick="quickLaunch('https://www.tiktok.com')">
                    <span class="block text-sm">TikTok</span>
                </div>
            </div>
        </div>
    </div>

    <!-- DOCK -->
    <div class="dock">
        <div class="dock-app" onclick="openWin('win-proxy')" title="Web Browser">🌐</div>
        <div class="dock-app" title="Files">📂</div>
        <div class="dock-app" title="Settings">⚙️</div>
        <div class="w-[1px] h-6 bg-white/20 mx-2"></div>
        <div class="dock-app" onclick="panic()" title="Panic Button">🚨</div>
    </div>

    <script>
        // List of active public proxy mirrors
        const UV_NODES = [
            "https://science-asphalt.vercel.app/",
            "https://t-800.info/",
            "https://astroid.wtf/"
        ];

        function openWin(id) {
            const win = document.getElementById(id);
            win.style.display = 'flex';
            win.style.zIndex = "100";
        }

        function closeWin(id) {
            document.getElementById(id).style.display = 'none';
        }

        function launch(method) {
            let url = document.getElementById('target-url').value;
            if (!url) return;
            
            // Format URL
            if (!url.startsWith('http')) {
                if (url.includes('.')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }

            // Pick a random node for load balancing
            const node = UV_NODES[Math.floor(Math.random() * UV_NODES.length)];
            const finalProxyUrl = node + "#" + btoa(url); // Most proxies use Base64 hashes

            // STEALTH LAUNCH:
            // We open it in a new window with a generic name to prevent history tracking
            const win = window.open('about:blank', '_blank');
            win.document.write(`
                <title>Google Docs</title>
                <body style="margin:0;padding:0;overflow:hidden;">
                    <iframe src="${finalProxyUrl}" style="width:100%;height:100vh;border:none;"></iframe>
                </body>
            `);
        }

        function quickLaunch(url) {
            document.getElementById('target-url').value = url;
            launch('uv');
        }

        function panic() {
            window.location.replace("https://www.google.com");
        }

        // Draggable Function
        function dragWin(el) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            el.onmousedown = (e) => {
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                    p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px";
                    el.style.left = (el.offsetLeft - p1) + "px";
                };
            }
        }
    </script>
</body>
</html>
