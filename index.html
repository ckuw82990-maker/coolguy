<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Notes | Secure Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400&display=swap');
        
        :root { 
            --accent: #a855f7; 
            --accent-hover: #9333ea;
            --bg-dark: #020617; 
            --panel-bg: rgba(15, 23, 42, 0.6);
        }

        body { 
            background-color: var(--bg-dark); 
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Navigation Sidebar */
        .sidebar {
            width: 72px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem 0;
            border-right: 1px solid rgba(255,255,255,0.06);
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .nav-item {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            margin-bottom: 1.25rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #94a3b8;
            position: relative;
        }

        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0 8px 20px -4px rgba(168, 85, 247, 0.5); }
        
        /* Tooltip style */
        .nav-item::after {
            content: attr(data-title);
            position: absolute;
            left: 60px;
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }
        .nav-item:hover::after { opacity: 1; transform: translateX(5px); }

        /* Main Workspace Layout */
        .workspace-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            flex: 1;
            height: 100vh;
        }

        .notes-list-pane {
            background: rgba(2, 6, 23, 0.4);
            border-right: 1px solid rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
        }

        /* Note Items */
        .note-card {
            padding: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .note-card:hover { background: rgba(255,255,255,0.02); }
        .note-card.active { background: rgba(168, 85, 247, 0.08); }
        .note-card.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--accent);
        }

        /* Editor Area */
        .editor-pane {
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.03), transparent);
        }

        .editor-header {
            padding: 1.5rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #noteTitle {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1.875rem;
            font-weight: 700;
            width: 100%;
            letter-spacing: -0.025em;
        }

        #noteBody {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #cbd5e1;
            font-size: 1.05rem;
            padding: 0 2.5rem 2rem 2.5rem;
            resize: none;
            line-height: 1.8;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Overlay Systems */
        #proxy-overlay {
            position: fixed;
            inset: 0 0 0 72px;
            background: var(--bg-dark);
            z-index: 200;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        #proxy-overlay.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Stealth Elements */
        .panic-bar {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 0.75rem;
            z-index: 300;
        }

        .btn-stealth {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            transition: all 0.2s;
        }
        .btn-stealth:hover { border-color: var(--accent); color: white; transform: translateY(-2px); }
        .btn-panic { color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
        .btn-panic:hover { background: #ef4444; color: white; border-color: #ef4444; }

        /* Formatting Toolbar */
        .toolbar {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 2.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 1rem;
            align-items: center;
        }
        .tool-btn { color: #64748b; font-size: 12px; cursor: pointer; }
        .tool-btn:hover { color: var(--accent); }

        .tag {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(168, 85, 247, 0.1);
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="particles-js" class="fixed inset-0 pointer-events-none opacity-20"></div>

    <!-- Persistent Sidebar -->
    <aside class="sidebar">
        <div class="nav-item active" data-title="Notes" id="nav-notes" onclick="setMode('notes')">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </div>
        
        <div class="nav-item" data-title="Hub" onclick="window.location.href='GamingHub_All-in-One.html'">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4m-2-2v4m7-1h.01m2.99-2h.01"/></svg>
        </div>

        <div class="nav-item" data-title="Games" onclick="window.location.href='games.html'">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
        </div>

        <div class="nav-item" data-title="Proxy" id="nav-proxy" onclick="setMode('proxy')">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        </div>

        <div class="mt-auto nav-item text-red-500 hover:bg-red-500/10" data-title="Panic" onclick="launchPanic()">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </div>
    </aside>

    <!-- Web Proxy Overlay -->
    <div id="proxy-overlay">
        <div class="p-4 bg-slate-900/80 border-bottom border-white/5 flex items-center gap-4">
            <button onclick="setMode('notes')" class="text-xs font-bold text-slate-400 hover:text-white">ESC</button>
            <div class="flex-1 bg-black/40 rounded-lg flex items-center px-4 py-2 border border-white/5">
                <input type="text" id="proxy-url" class="bg-transparent border-none outline-none text-sm w-full text-slate-300" placeholder="Browse stealthily (e.g., duckduckgo.com)">
            </div>
            <button onclick="loadProxy()" class="bg-violet-600 px-6 py-2 rounded-lg text-xs font-bold hover:bg-violet-500 transition">LAUNCH</button>
        </div>
        <iframe id="proxy-frame" class="flex-1 w-full bg-white border-none"></iframe>
    </div>

    <!-- Notes Workspace -->
    <div class="workspace-grid w-full">
        <section class="notes-list-pane">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="heading-font text-xs font-bold tracking-[0.2em] text-slate-500">COLLECTIONS</h2>
                    <button onclick="addNewNote()" class="text-violet-400 hover:text-white transition">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                    </button>
                </div>
                
                <div class="relative mb-4">
                    <input type="text" id="searchNotes" placeholder="Search notes..." oninput="filterNotes()" class="w-full bg-white/5 border border-white/10 rounded-lg py-2 px-4 text-xs outline-none focus:border-violet-500 transition">
                </div>
            </div>

            <div id="notesList" class="flex-1 overflow-y-auto">
                <!-- Notes injected here -->
            </div>
            
            <div class="p-4 border-t border-white/5">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.4)]"></div>
                    <span class="text-[10px] font-bold text-slate-500 tracking-wider">SYNCED TO LOCALHOST</span>
                </div>
            </div>
        </section>

        <section class="editor-pane">
            <div class="editor-header">
                <div class="flex flex-col gap-1 w-full">
                    <div class="flex items-center gap-2">
                        <span class="tag">System_Doc</span>
                        <span id="saveStatus" class="text-[9px] text-slate-500 italic opacity-0 transition-opacity">Saving...</span>
                    </div>
                    <input type="text" id="noteTitle" placeholder="Untitled Entry" oninput="saveCurrentNote()">
                </div>
            </div>

            <div class="toolbar">
                <button class="tool-btn" onclick="formatDoc('bold')"><b>B</b></button>
                <button class="tool-btn" onclick="formatDoc('italic')"><i>I</i></button>
                <button class="tool-btn" onclick="formatDoc('list')">• List</button>
                <div class="h-4 w-[1px] bg-white/10"></div>
                <button class="tool-btn" onclick="clearNote()">Clear</button>
                <button class="tool-btn ml-auto" onclick="deleteNote()">Delete</button>
            </div>

            <textarea id="noteBody" placeholder="Begin writing..." oninput="saveCurrentNote()"></textarea>
        </section>
    </div>

    <!-- Floating Panic Bar -->
    <div class="panic-bar">
        <button onclick="cloakTab()" class="btn-stealth">Cloak Tab</button>
        <button onclick="launchPanic()" class="btn-stealth btn-panic">Panic Key</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        // --- DATA MANAGEMENT ---
        let notes = JSON.parse(localStorage.getItem('nexus_notes_v2')) || [
            { id: Date.now(), title: 'Security Protocol Alpha', body: 'This environment is fully sandboxed.\n\nInstructions:\n1. Use the search bar to find entries.\n2. Ctrl+B to bold text.\n3. The Proxy is isolated from history.' }
        ];
        let currentNoteId = notes[0].id;

        function saveNotes() {
            localStorage.setItem('nexus_notes_v2', JSON.stringify(notes));
            const status = document.getElementById('saveStatus');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 800);
        }

        // --- RENDER LOGIC ---
        function renderNotesList() {
            const list = document.getElementById('notesList');
            const search = document.getElementById('searchNotes').value.toLowerCase();
            
            const filtered = notes.filter(n => 
                n.title.toLowerCase().includes(search) || 
                n.body.toLowerCase().includes(search)
            );

            list.innerHTML = filtered.map(note => `
                <div class="note-card ${note.id === currentNoteId ? 'active' : ''}" onclick="selectNote(${note.id})">
                    <h3 class="text-sm font-semibold text-white truncate mb-1">${note.title || 'Untitled Entry'}</h3>
                    <p class="text-[11px] text-slate-500 line-clamp-2">${note.body.substring(0, 60) || 'Empty entry...'}</p>
                </div>
            `).join('');
        }

        function selectNote(id) {
            currentNoteId = id;
            const note = notes.find(n => n.id === id);
            if(note) {
                document.getElementById('noteTitle').value = note.title;
                document.getElementById('noteBody').value = note.body;
            }
            renderNotesList();
        }

        function addNewNote() {
            const newNote = { id: Date.now(), title: '', body: '' };
            notes.unshift(newNote);
            currentNoteId = newNote.id;
            selectNote(newNote.id);
            document.getElementById('noteTitle').focus();
        }

        function saveCurrentNote() {
            const title = document.getElementById('noteTitle').value;
            const body = document.getElementById('noteBody').value;
            const index = notes.findIndex(n => n.id === currentNoteId);
            if (index !== -1) {
                notes[index].title = title;
                notes[index].body = body;
                saveNotes();
                renderNotesList();
            }
        }

        function deleteNote() {
            if(notes.length <= 1) return;
            notes = notes.filter(n => n.id !== currentNoteId);
            currentNoteId = notes[0].id;
            selectNote(currentNoteId);
            saveNotes();
        }

        function filterNotes() { renderNotesList(); }

        // --- UTILS ---
        function formatDoc(type) {
            const el = document.getElementById('noteBody');
            const start = el.selectionStart;
            const end = el.selectionEnd;
            const text = el.value;
            let formatted = '';

            if (type === 'bold') formatted = `**${text.substring(start, end)}**`;
            if (type === 'italic') formatted = `*${text.substring(start, end)}*`;
            if (type === 'list') formatted = `\n- ${text.substring(start, end)}`;

            el.value = text.substring(0, start) + formatted + text.substring(end);
            saveCurrentNote();
        }

        function clearNote() {
            document.getElementById('noteBody').value = '';
            saveCurrentNote();
        }

        // --- NAVIGATION ---
        function setMode(mode) {
            const proxyOverlay = document.getElementById('proxy-overlay');
            const proxyNav = document.getElementById('nav-proxy');
            const notesNav = document.getElementById('nav-notes');

            if(mode === 'proxy') {
                proxyOverlay.classList.add('active');
                proxyNav.classList.add('active');
                notesNav.classList.remove('active');
            } else {
                proxyOverlay.classList.remove('active');
                proxyNav.classList.remove('active');
                notesNav.classList.add('active');
            }
        }

        function loadProxy() {
            let url = document.getElementById('proxy-url').value.trim();
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('proxy-frame').src = url;
        }

        document.getElementById('proxy-url').onkeydown = (e) => { if(e.key === 'Enter') loadProxy(); };

        // --- STEALTH ---
        function launchPanic() { window.location.href = 'https://www.google.com'; }
        function cloakTab() {
            document.title = "Class Notes - World History";
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.href = 'https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico';
            document.getElementsByTagName('head')[0].appendChild(link);
        }

        // --- BOOT ---
        window.onload = () => {
            selectNote(currentNoteId);
            particlesJS('particles-js', {
                particles: { 
                    number: { value: 25 }, 
                    color: { value: "#a855f7" }, 
                    shape: { type: "circle" }, 
                    opacity: { value: 0.1 }, 
                    size: { value: 1.5 }, 
                    move: { enable: true, speed: 0.4, direction: "top", random: true } 
                }
            });
        };
    </script>
</body>
</html>
