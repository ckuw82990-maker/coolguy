<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Stealth Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #proxy-ui, #game-ui { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; }
        .proxy-active #proxy-ui, .game-active #game-ui { display: flex; }
        
        .card-hover:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px -10px rgba(139, 92, 246, 0.3); }
        iframe { background: white; width: 100%; height: 100%; border: none; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
        
        .sync-anim { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="overflow-y-auto">

    <!-- STEALTH LAUNCHER -->
    <div id="launcher-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center text-center p-6 transition-transform duration-700">
        <div class="w-20 h-20 bg-violet-600 rounded-2xl mb-6 flex items-center justify-center heading-font font-bold text-4xl shadow-2xl shadow-violet-500/50">N</div>
        <h1 class="text-4xl font-black heading-font mb-2">NEXUS HUB</h1>
        <div class="flex flex-col sm:flex-row gap-4 mt-8">
            <button onclick="launchAboutBlank()" class="bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-full font-bold transition">Launch Stealth Mode</button>
            <button onclick="enterRegular()" class="text-slate-500 hover:text-white transition py-4">Continue in tab</button>
        </div>
    </div>

    <!-- PROXY OVERLAY -->
    <div id="proxy-ui">
        <div class="p-3 glass flex items-center gap-4 flex-wrap">
            <button onclick="closeProxy()" class="bg-red-500/20 text-red-400 p-2 px-4 rounded-lg text-xs font-bold uppercase tracking-wider">Exit</button>
            <input type="text" id="proxy-input" placeholder="https://..." class="flex-1 min-w-[200px] bg-slate-900 border border-white/10 rounded-lg px-4 py-2 text-white outline-none focus:border-violet-500">
            <button onclick="launchProxy()" class="bg-violet-600 px-6 py-2 rounded-lg font-bold">Go</button>
            <div class="flex gap-2">
                <button onclick="downloadProxyContent()" class="bg-emerald-600 p-2 rounded-lg px-3 flex items-center gap-2"><span class="text-[10px] font-bold">DIRECT</span></button>
                <button onclick="stealthDownload()" class="bg-blue-600 p-2 rounded-lg px-3 flex items-center gap-2"><span class="text-[10px] font-bold">BYPASS</span></button>
            </div>
        </div>
        <div class="flex-1"><iframe id="proxy-frame"></iframe></div>
    </div>

    <!-- GAME OVERLAY -->
    <div id="game-ui">
        <div class="p-3 glass flex items-center justify-between">
            <button onclick="closeGame()" class="bg-red-500/20 text-red-400 p-2 px-4 rounded-lg text-xs font-bold uppercase">Exit Game</button>
            <span id="active-game-title" class="heading-font text-violet-400 text-sm"></span>
            <button onclick="document.getElementById('game-frame').contentWindow.location.reload()" class="bg-slate-800 p-2 px-4 rounded-lg text-xs">Reload</button>
        </div>
        <div class="flex-1"><iframe id="game-frame" allow="autoplay; fullscreen; keyboard"></iframe></div>
    </div>

    <!-- MAIN NAV -->
    <nav class="fixed top-0 w-full z-50 glass px-8 py-4 flex justify-between items-center">
        <span class="text-lg font-bold heading-font italic">NEXUS<span class="text-violet-500">HUB</span></span>
        <div class="flex items-center gap-6">
            <div id="user-display" class="hidden items-center gap-4">
                <p id="nav-username" class="text-sm font-bold text-violet-400"></p>
                <button onclick="signOut()" class="text-[10px] text-slate-500 uppercase tracking-widest">Sign Out</button>
            </div>
            <button id="login-trigger" onclick="openAuthModal()" class="bg-white text-black px-4 py-1.5 rounded-full text-xs font-bold hover:bg-violet-500 transition">Account</button>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-6 container mx-auto max-w-6xl">
        <div class="grid lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3 space-y-8">
                
                <!-- REPOSITORY SYNC BOX -->
                <div class="glass p-8 rounded-3xl border border-white/10 relative overflow-hidden bg-gradient-to-br from-slate-900/50 to-transparent">
                    <div class="relative z-10">
                        <h3 class="heading-font text-xl mb-4 flex items-center gap-3">
                            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                            GitHub Repository Sync
                        </h3>
                        <p class="text-sm text-slate-400 mb-6 italic">Pull games directly from your GitHub repository files. Any HTML file added to the repo will appear here.</p>
                        
                        <div class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="repo-path" placeholder="username/repository" class="flex-1 bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-violet-500 font-mono text-sm">
                            <button id="sync-btn" onclick="syncRepository()" class="bg-violet-600 px-8 py-3 rounded-xl font-bold hover:bg-violet-400 transition flex items-center justify-center gap-2 group">
                                <svg id="sync-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                <span>Sync Library</span>
                            </button>
                        </div>
                        <p class="text-[10px] text-slate-500 mt-4 uppercase tracking-widest">Active Repo: <span id="current-repo-display" class="text-violet-400">None</span></p>
                    </div>
                    <div class="absolute right-[-5%] bottom-[-20%] w-48 h-48 bg-violet-600/5 rounded-full blur-3xl"></div>
                </div>

                <!-- INSTALLED GAMES -->
                <div>
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="heading-font text-xs tracking-widest text-slate-500 uppercase">Deployed Applications</h3>
                        <span id="game-count" class="text-[10px] bg-slate-800 px-3 py-1 rounded-full text-slate-400 font-bold border border-white/5">0 FILES</span>
                    </div>
                    <div id="game-library" class="game-grid">
                        <!-- Sync results go here -->
                    </div>
                </div>
            </div>
            
            <!-- SIDEBAR -->
            <div class="glass p-6 rounded-3xl h-fit space-y-6">
                <h3 class="heading-font text-[10px] tracking-widest text-violet-400 uppercase">Cloud Profile</h3>
                <div id="user-status-card" class="text-sm space-y-2"></div>
                
                <div class="pt-4 border-t border-white/10 flex flex-col gap-3">
                    <button onclick="downloadSelf()" class="text-[10px] uppercase font-bold text-emerald-400 hover:text-emerald-300 transition-colors text-left flex items-center gap-2 group">
                        <svg class="group-hover:translate-y-0.5 transition-transform" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Archive Hub (.html)
                    </button>
                    <button onclick="exportData()" class="text-[10px] uppercase font-bold text-slate-500 hover:text-white transition-colors text-left">Backup Data (.nexus)</button>
                    <label class="text-[10px] uppercase font-bold text-slate-500 hover:text-white cursor-pointer transition-colors">
                        Restore Backup
                        <input type="file" id="import-file" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </div>
    </main>

    <!-- MODALS -->
    <div id="custom-alert" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="glass max-w-sm w-full p-8 rounded-3xl text-center border border-white/20 shadow-2xl">
            <h3 id="alert-title" class="heading-font font-bold text-xl mb-2">NOTICE</h3>
            <p id="alert-body" class="text-slate-400 text-sm mb-6 leading-relaxed"></p>
            <button onclick="document.getElementById('custom-alert').classList.add('hidden')" class="bg-violet-600 w-full py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:bg-violet-500 transition">Acknowledge</button>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="glass max-w-sm w-full p-8 rounded-3xl">
            <h2 class="heading-font font-bold mb-4 text-center">ACCESS IDENTIFICATION</h2>
            <p class="text-[10px] text-center text-slate-500 uppercase tracking-widest mb-6">Enter codename to enable sync</p>
            <input type="text" id="auth-username" placeholder="Codename" class="w-full bg-slate-900 border border-white/10 p-4 rounded-xl mb-4 text-white outline-none focus:border-violet-500 transition-colors">
            <button onclick="handleLogin()" class="w-full bg-violet-600 p-4 rounded-xl font-bold uppercase text-xs tracking-widest">Authorize Access</button>
        </div>
    </div>

    <script>
        /** STEALTH CORE **/
        function enterRegular() { document.getElementById('launcher-screen').style.display = 'none'; }
        function launchAboutBlank() { 
            const win = window.open('about:blank', '_blank'); 
            if(!win) return showModal("POPUP BLOCKED", "Please allow popups to launch stealth mode.");
            const doc = win.document;
            doc.write('<!DOCTYPE html><html>' + document.documentElement.innerHTML + '</html>'); 
            doc.close(); 
            window.location.replace("https://www.google.com"); 
        }

        /** DATA & PROFILE **/
        let user = JSON.parse(localStorage.getItem('nexus_hub_user')) || null;
        let installedGames = JSON.parse(localStorage.getItem('nexus_games')) || [];
        // Default to your provided repo path
        let repoPath = localStorage.getItem('nexus_repo_path') || 'ckuw82990-maker/coolguy';

        function updateUI() {
            document.getElementById('login-trigger').style.display = user ? 'none' : 'block';
            document.getElementById('user-display').style.display = user ? 'flex' : 'none';
            document.getElementById('repo-path').value = repoPath;
            document.getElementById('current-repo-display').innerText = repoPath || 'None';
            
            if(user) {
                document.getElementById('nav-username').innerText = user.username.toUpperCase();
                document.getElementById('user-status-card').innerHTML = `
                    <div class="flex justify-between"><span>Codename</span><span class="text-violet-400 font-bold">${user.username}</span></div>
                    <div class="flex justify-between"><span>Sync Count</span><span class="text-white">${installedGames.length}</span></div>
                    <div class="flex justify-between"><span>Network</span><span class="text-emerald-500">Connected</span></div>
                `;
            } else {
                document.getElementById('user-status-card').innerHTML = `<p class="text-slate-500 italic text-center py-2">Account Required for Sync</p>`;
            }
            document.getElementById('game-count').innerText = `${installedGames.length} FILES`;
            renderLibrary();
        }

        function handleLogin() {
            const name = document.getElementById('auth-username').value;
            if (name.length < 2) return;
            user = { username: name };
            localStorage.setItem('nexus_hub_user', JSON.stringify(user));
            document.getElementById('auth-modal').classList.add('hidden');
            updateUI();
        }
        function signOut() { user = null; localStorage.removeItem('nexus_hub_user'); updateUI(); }
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }

        /** GITHUB REPO SYNC LOGIC **/
        async function syncRepository() {
            if(!user) return openAuthModal();
            let path = document.getElementById('repo-path').value.trim();
            // Clean path if it's a full URL
            if(path.includes('github.com/')) {
                path = path.split('github.com/')[1].split('?')[0].split('#')[0];
                if(path.endsWith('/')) path = path.slice(0,-1);
            }
            
            if(!path) return showModal("MISSING PATH", "Please enter a repository in 'user/repo' format.");
            
            const btn = document.getElementById('sync-btn');
            const icon = document.getElementById('sync-icon');
            
            btn.disabled = true;
            icon.classList.add('sync-anim');
            
            try {
                // Fetch repo contents via GitHub API
                const response = await fetch(`https://api.github.com/repos/${path}/contents/`);
                if(!response.ok) throw new Error("Repository not found or API limit reached.");
                
                const files = await response.json();
                
                // Filter for .html files
                const games = files
                    .filter(file => file.name.toLowerCase().endsWith('.html'))
                    .map(file => ({
                        id: file.sha,
                        name: file.name.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' '),
                        // We use the raw URL for iframe compatibility
                        url: `https://raw.githubusercontent.com/${path}/main/${file.path}`
                    }));

                if(games.length === 0) {
                    showModal("EMPTY REPOSITORY", "The sync found the repo, but there are no .html files in the root folder.");
                } else {
                    installedGames = games;
                    repoPath = path;
                    localStorage.setItem('nexus_games', JSON.stringify(installedGames));
                    localStorage.setItem('nexus_repo_path', repoPath);
                    showModal("SYNC SUCCESS", `Detected and imported ${games.length} game files from ${path}.`);
                }
            } catch (err) {
                showModal("SYNC FAILED", err.message + ". Make sure the repo is public.");
            } finally {
                btn.disabled = false;
                icon.classList.remove('sync-anim');
                updateUI();
            }
        }

        function renderLibrary() {
            const lib = document.getElementById('game-library');
            lib.innerHTML = '';
            
            // System Proxy Utility
            lib.innerHTML += `
                <div onclick="openProxy()" class="card-hover glass p-4 rounded-2xl cursor-pointer border border-transparent transition-all group">
                    <div class="h-20 bg-slate-800/50 rounded-xl mb-3 flex items-center justify-center text-violet-400 group-hover:bg-violet-600/20 transition-colors">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
                    </div>
                    <h4 class="font-bold text-[10px] text-center uppercase tracking-widest text-slate-400 group-hover:text-white">Web Proxy</h4>
                </div>
            `;

            installedGames.forEach(game => {
                const card = document.createElement('div');
                card.className = "card-hover glass p-4 rounded-2xl cursor-pointer border border-transparent transition-all relative group";
                card.innerHTML = `
                    <div onclick="launchGame('${game.url}', '${game.name}')" class="h-20 bg-violet-600/5 border border-white/5 rounded-xl mb-3 flex items-center justify-center text-violet-400 font-bold heading-font text-lg group-hover:bg-violet-600/20 group-hover:text-violet-300 transition-all">
                        ${game.name.charAt(0).toUpperCase()}
                    </div>
                    <h4 class="font-bold text-[10px] text-center uppercase truncate tracking-tight text-slate-300 group-hover:text-white">${game.name}</h4>
                `;
                lib.appendChild(card);
            });
        }

        function launchGame(url, name) {
            document.getElementById('active-game-title').innerText = name.toUpperCase();
            document.getElementById('game-frame').src = url;
            document.body.classList.add('game-active');
        }

        function closeGame() {
            document.body.classList.remove('game-active');
            document.getElementById('game-frame').src = '';
        }

        /** PROXY & TOOLS **/
        function openProxy() { document.body.classList.add('proxy-active'); }
        function closeProxy() { document.body.classList.remove('proxy-active'); }
        function launchProxy() { 
            let url = document.getElementById('proxy-input').value;
            if(!url) return;
            if(!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('proxy-frame').src = url; 
        }

        function stealthDownload() {
            const url = document.getElementById('proxy-input').value;
            if(!url) return;
            fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`)
                .then(r => r.json())
                .then(d => {
                    const blob = new Blob([d.contents], {type:'text/html'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'nexus_capture.html'; a.click();
                });
        }

        function downloadProxyContent() {
            try {
                const content = document.getElementById('proxy-frame').contentWindow.document.documentElement.outerHTML;
                const blob = new Blob([content], {type: 'text/html'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'proxy_capture.html'; a.click();
            } catch (e) {
                showModal("ENCRYPTED SOURCE", "Direct capture was blocked by browser security. Use the 'BYPASS' button in the toolbar instead.");
            }
        }

        function showModal(t, b) {
            document.getElementById('alert-title').innerText = t;
            document.getElementById('alert-body').innerText = b;
            document.getElementById('custom-alert').classList.remove('hidden');
        }

        function downloadSelf() {
            const html = '<!DOCTYPE html>\n<html lang="en">' + document.documentElement.innerHTML + '</html>';
            const blob = new Blob([html], {type:'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'nexus_hub.html'; a.click();
        }

        function exportData() {
            const data = { user, games: installedGames, repo: repoPath };
            const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'nexus_backup.nexus'; a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    user = data.user;
                    installedGames = data.games || [];
                    repoPath = data.repo || '';
                    localStorage.setItem('nexus_hub_user', JSON.stringify(user));
                    localStorage.setItem('nexus_games', JSON.stringify(installedGames));
                    localStorage.setItem('nexus_repo_path', repoPath);
                    updateUI();
                    showModal("RESTORED", "Profile and library data successfully imported.");
                } catch(err) {
                    showModal("ERROR", "Invalid backup file format.");
                }
            };
            reader.readAsText(file);
        }

        // Initialize
        updateUI();
    </script>
</body>
</html>
