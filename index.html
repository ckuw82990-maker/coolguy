<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Stealth Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --accent: #8b5cf6; --bg-dark: #020617; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; height: 100vh; }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #proxy-ui { display: none; position: fixed; inset: 0; z-index: 100; background: #000; flex-direction: column; }
        .proxy-active #proxy-ui { display: flex; }
        .card-hover:hover { transform: translateY(-5px); border-color: var(--accent); }
    </style>
</head>
<body class="overflow-y-auto">

    <!-- STEALTH LAUNCHER -->
    <div id="launcher-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center text-center p-6 transition-transform duration-700">
        <div class="w-20 h-20 bg-violet-600 rounded-2xl mb-6 flex items-center justify-center heading-font font-bold text-4xl shadow-2xl shadow-violet-500/50">N</div>
        <h1 class="text-4xl font-black heading-font mb-2">NEXUS HUB</h1>
        <div class="flex flex-col sm:flex-row gap-4 mt-8">
            <button onclick="launchAboutBlank()" class="bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-full font-bold transition">Launch Stealth Mode</button>
            <button onclick="enterRegular()" class="text-slate-500 hover:text-white transition py-4">Continue in tab</button>
        </div>
    </div>

    <!-- PROXY OVERLAY -->
    <div id="proxy-ui">
        <div class="p-3 glass flex items-center gap-4">
            <button onclick="closeProxy()" class="bg-red-500/20 text-red-400 p-2 px-4 rounded-lg">Exit</button>
            <input type="text" id="proxy-input" placeholder="https://..." class="flex-1 bg-slate-900 border border-white/10 rounded-lg px-4 py-2 text-white outline-none">
            <button onclick="launchProxy()" class="bg-violet-600 px-6 py-2 rounded-lg font-bold">Go</button>
            <button onclick="downloadProxyContent()" title="Download current page source" class="bg-emerald-600 p-2 rounded-lg hover:bg-emerald-500 transition">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            </button>
        </div>
        <div class="flex-1 bg-white"><iframe id="proxy-frame" src="" class="w-full h-full border-none"></iframe></div>
    </div>

    <!-- MAIN NAV -->
    <nav class="fixed top-0 w-full z-50 glass px-8 py-4 flex justify-between items-center">
        <span class="text-lg font-bold heading-font italic">NEXUS<span class="text-violet-500">HUB</span></span>
        <div class="flex items-center gap-6">
            <div id="user-display" class="hidden items-center gap-4">
                <p id="nav-username" class="text-sm font-bold text-violet-400"></p>
                <button onclick="signOut()" class="text-[10px] text-slate-500 uppercase tracking-widest">Sign Out</button>
            </div>
            <button id="login-trigger" onclick="openAuthModal()" class="bg-white text-black px-4 py-1.5 rounded-full text-xs font-bold hover:bg-violet-500 hover:text-white transition">Account</button>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-6 container mx-auto max-w-6xl">
        <div class="grid lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-3 space-y-8">
                <!-- WELCOME BANNER -->
                <div class="relative rounded-3xl overflow-hidden border border-white/10 p-12 bg-gradient-to-br from-slate-900 to-slate-950 shadow-2xl">
                    <div class="relative z-10 max-w-lg">
                        <h2 class="text-4xl font-black heading-font mb-4">SECURE ACCESS</h2>
                        <p class="text-slate-400 mb-8 italic">Your encrypted gateway to the open web. Launch the proxy or manage your data backups below.</p>
                        <button onclick="openProxy()" class="bg-violet-600 px-8 py-4 rounded-xl font-black heading-font tracking-widest hover:bg-violet-500 transition shadow-lg shadow-violet-500/20">LAUNCH PROXY</button>
                    </div>
                    <div class="absolute right-[-10%] top-[-20%] w-96 h-96 bg-violet-600/10 rounded-full blur-[120px]"></div>
                </div>

                <!-- TOOLS GRID -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div onclick="openProxy()" class="card-hover glass p-8 rounded-3xl cursor-pointer transition-all border border-transparent flex items-center gap-6">
                        <div class="w-16 h-16 bg-violet-600/20 rounded-2xl flex items-center justify-center text-violet-400">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-lg">Web Proxy</h4>
                            <p class="text-slate-500 text-sm">Access sites through stealth.</p>
                        </div>
                    </div>
                    <div onclick="downloadSelf()" class="card-hover glass p-8 rounded-3xl cursor-pointer transition-all border border-transparent flex items-center gap-6">
                        <div class="w-16 h-16 bg-emerald-600/20 rounded-2xl flex items-center justify-center text-emerald-400">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        </div>
                        <div>
                            <h4 class="font-bold text-lg">Hub Backup</h4>
                            <p class="text-slate-500 text-sm">Save this tool for offline use.</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- SIDEBAR -->
            <div class="glass p-6 rounded-3xl h-fit space-y-6">
                <h3 class="heading-font text-[10px] tracking-widest text-violet-400 uppercase">Profile Cloud</h3>
                <div id="recent-scores" class="text-sm space-y-2"></div>
                <div class="pt-4 border-t border-white/10 flex flex-col gap-3">
                    <button onclick="exportData()" class="text-[10px] uppercase font-bold text-slate-500 hover:text-white transition-colors text-left">Export .nexus</button>
                    <label class="text-[10px] uppercase font-bold text-slate-500 hover:text-white cursor-pointer transition-colors">
                        Import Data
                        <input type="file" id="import-file" class="hidden" onchange="importData(event)">
                    </label>
                </div>
            </div>
        </div>
    </main>

    <!-- ALERT BOX (Custom) -->
    <div id="custom-alert" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/80">
        <div class="glass max-w-sm w-full p-8 rounded-3xl text-center">
            <h3 id="alert-title" class="heading-font font-bold text-xl mb-2">NOTICE</h3>
            <p id="alert-body" class="text-slate-400 text-sm mb-6"></p>
            <button onclick="document.getElementById('custom-alert').classList.add('hidden')" class="bg-violet-600 px-8 py-2 rounded-full font-bold">CLOSE</button>
        </div>
    </div>

    <!-- AUTH -->
    <div id="auth-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="glass max-w-sm w-full p-8 rounded-3xl">
            <h2 class="heading-font font-bold mb-4 text-center">CREATE ACCOUNT</h2>
            <input type="text" id="auth-username" placeholder="Username" class="w-full bg-slate-900 border border-white/10 p-3 rounded-xl mb-4 text-white">
            <button onclick="handleLogin()" class="w-full bg-violet-600 p-4 rounded-xl font-bold uppercase text-xs">Enter Hub</button>
        </div>
    </div>

    <script>
        /** STEALTH & BOOT **/
        function enterRegular() { document.getElementById('launcher-screen').style.display = 'none'; }
        function launchAboutBlank() { 
            const win = window.open('about:blank', '_blank'); 
            const doc = win.document;
            doc.write('<!DOCTYPE html><html>' + document.documentElement.innerHTML + '</html>'); 
            doc.close(); 
            window.location.replace("https://www.google.com"); 
        }

        /** DOWNLOAD FEATURES **/
        function downloadSelf() {
            const blob = new Blob(['<!DOCTYPE html>\n<html>' + document.documentElement.innerHTML + '</html>'], {type: 'text/html'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'nexus_stealth_hub.html'; a.click();
        }

        async function downloadProxyContent() {
            const frame = document.getElementById('proxy-frame');
            const alertBox = document.getElementById('custom-alert');
            const alertTitle = document.getElementById('alert-title');
            const alertBody = document.getElementById('alert-body');

            try {
                const content = frame.contentWindow.document.documentElement.outerHTML;
                const blob = new Blob([content], {type: 'text/html'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'captured_page.html'; a.click();
            } catch (e) {
                alertTitle.innerText = "SECURITY BLOCK";
                alertBody.innerText = "Direct access to this site is blocked by CORS policy. To download, please copy the URL and use a local 'Save Page As' or use a proxy bridge that supports source extraction.";
                alertBox.classList.remove('hidden');
            }
        }

        /** DATA SYSTEM **/
        let user = JSON.parse(localStorage.getItem('nexus_hub_user')) || null;
        function updateAccountUI() {
            document.getElementById('login-trigger').style.display = user ? 'none' : 'block';
            document.getElementById('user-display').style.display = user ? 'flex' : 'none';
            if(user) {
                document.getElementById('nav-username').innerText = user.username.toUpperCase();
                document.getElementById('recent-scores').innerHTML = `
                    <div class="flex justify-between"><span>Active User</span><span class="text-violet-400 font-bold">${user.username}</span></div>
                    <div class="flex justify-between text-slate-500"><span>Status</span><span>Encrypted</span></div>
                `;
            } else {
                document.getElementById('recent-scores').innerHTML = `<p class="text-slate-500 italic">No account connected.</p>`;
            }
        }
        function handleLogin() {
            const name = document.getElementById('auth-username').value;
            if (name.length < 2) return;
            user = { username: name };
            localStorage.setItem('nexus_hub_user', JSON.stringify(user));
            document.getElementById('auth-modal').classList.add('hidden');
            updateAccountUI();
        }
        function signOut() { user = null; localStorage.removeItem('nexus_hub_user'); updateAccountUI(); }
        function openAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function exportData() {
            if(!user) return;
            const blob = new Blob([JSON.stringify(user)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `nexus_${user.username}.nexus`; a.click();
        }
        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { user = JSON.parse(ev.target.result); localStorage.setItem('nexus_hub_user', JSON.stringify(user)); updateAccountUI(); };
            reader.readAsText(e.target.files[0]);
        }

        /** PROXY **/
        function openProxy() { document.body.classList.add('proxy-active'); }
        function closeProxy() { document.body.classList.remove('proxy-active'); }
        function launchProxy() { 
            let url = document.getElementById('proxy-input').value;
            if(!url.startsWith('http')) url = 'https://' + url;
            document.getElementById('proxy-frame').src = url; 
        }
        updateAccountUI();
    </script>
</body>
</html>
